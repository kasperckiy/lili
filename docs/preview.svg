<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img"
    aria-labelledby="title desc">
    <title id="title">LiLi preview</title>
    <desc id="desc">Preview illustration of LinkedIn member cards with Connect, Pending, and Message actions.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#eef5ff" />
            <stop offset="100%" stop-color="#dcecff" />
        </linearGradient>
        <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#f7faff" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#4d6ea31f" />
        </filter>
    </defs>

    <rect width="1200" height="720" fill="url(#bg)" />
    <rect x="56" y="44" width="1088" height="632" rx="32" fill="#113a67" />
    <text x="96" y="118" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="34"
        font-weight="700">LiLi</text>
    <text x="96" y="160" fill="#8ec0ff" font-family="Segoe UI, Arial, sans-serif" font-size="22">LinkedIn Group Priority
        Actions</text>

    <g filter="url(#shadow)">
        <rect x="78" y="206" width="1044" height="420" rx="28" fill="#eef3f8" />
    </g>

    <g transform="translate(118 248)">
        <rect width="964" height="98" rx="22" fill="url(#panel)" />
        <circle cx="52" cy="49" r="24" fill="#d5e7ff" />
        <text x="92" y="42" fill="#172b4d" font-family="Segoe UI, Arial, sans-serif" font-size="22"
            font-weight="700">Viktor Vorobev</text>
        <text x="92" y="71" fill="#5b6b82" font-family="Segoe UI, Arial, sans-serif" font-size="16">System Software Tech
            Lead at Emlid</text>
        <rect x="818" y="26" width="112" height="44" rx="22" fill="#0a66c2" />
        <text x="874" y="54" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif"
            font-size="18" font-weight="700">Connect</text>
    </g>

    <g transform="translate(118 366)">
        <rect width="964" height="98" rx="22" fill="url(#panel)" />
        <circle cx="52" cy="49" r="24" fill="#ffe2c7" />
        <text x="92" y="42" fill="#172b4d" font-family="Segoe UI, Arial, sans-serif" font-size="22"
            font-weight="700">Tatia Bagash</text>
        <text x="92" y="71" fill="#5b6b82" font-family="Segoe UI, Arial, sans-serif" font-size="16">IT recruiter</text>
        <rect x="818" y="26" width="112" height="44" rx="22" fill="#ffffff" stroke="#b87400" stroke-width="2.5"
            stroke-dasharray="7 5" />
        <text x="874" y="54" text-anchor="middle" fill="#8a5a00" font-family="Segoe UI, Arial, sans-serif"
            font-size="18" font-weight="700">Pending</text>
    </g>

    <g transform="translate(118 484)">
        <rect width="964" height="98" rx="22" fill="url(#panel)" />
        <circle cx="52" cy="49" r="24" fill="#dce3eb" />
        <text x="92" y="42" fill="#172b4d" font-family="Segoe UI, Arial, sans-serif" font-size="22"
            font-weight="700">Dmitrii Davidiak</text>
        <text x="92" y="71" fill="#5b6b82" font-family="Segoe UI, Arial, sans-serif" font-size="16">Senior IT
            Recruiter</text>
        <rect x="818" y="26" width="112" height="44" rx="22" fill="#ffffff" stroke="#0a66c2" stroke-width="2.5" />
        <text x="874" y="54" text-anchor="middle" fill="#0a66c2" font-family="Segoe UI, Arial, sans-serif"
            font-size="18" font-weight="700">Message</text>
    </g>

    <text x="96" y="642" fill="#a9c6ea" font-family="Segoe UI, Arial, sans-serif" font-size="18">Priority order: Connect
        → Pending → Message</text>
</svg>